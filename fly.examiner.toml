app = "ivelox-examiner"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"
  target = "examiner"

[env]
  EXAM_GEN_INTERVAL_HOURS = "8"

# Background worker — no HTTP service, must not be auto-stopped
[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
