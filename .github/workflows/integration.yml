name: Integration Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  integration:
    name: Integration Tests (Supabase Branch)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run integration tests
        run: go test -tags integration ./tests/integration/... -v -count=1
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          SUPABASE_URL: https://wntvsnkrtbochjakzhws.supabase.co
          SUPABASE_JWT_SECRET: ${{ secrets.CI_SUPABASE_JWT_SECRET }}
          SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
          PORT: "8080"
          FRONTEND_URL: "http://localhost:5173"
